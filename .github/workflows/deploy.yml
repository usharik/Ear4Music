name: Deploy to Google Play

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      track:
        description: 'Release track'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      release_notes:
        description: 'Release notes'
        required: false
        default: 'Bug fixes and improvements'
  
  # Automatic deployment on tag push
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write  # Needed for creating GitHub releases

jobs:
  deploy:
    name: Deploy to Google Play
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      
      - name: Grant execute permissions
        run: chmod +x gradlew
      
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > release-keystore.jks
      
      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
      
      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew :app:assembleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/release-keystore.jks \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            --no-daemon \
            --stacktrace

      - name: Determine release track and notes
        id: track
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "track=${{ inputs.track }}" >> $GITHUB_OUTPUT
            echo "notes=${{ inputs.release_notes || 'Bug fixes and improvements' }}" >> $GITHUB_OUTPUT
          else
            # For tag pushes, deploy to production
            echo "track=production" >> $GITHUB_OUTPUT
            echo "notes=Bug fixes and improvements" >> $GITHUB_OUTPUT
          fi

      - name: Upload APK to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ru.usharik.ear4music
          releaseFiles: app/build/outputs/apk/release/app-release.apk
          track: ${{ steps.track.outputs.track }}
          status: completed
          inAppUpdatePriority: 2

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app/build/outputs/apk/release/app-release.apk
          body: |
            ## Release ${{ github.ref_name }}

            ${{ steps.track.outputs.notes }}

            ### Downloads
            - **APK**: Direct installation file for Android devices

            ### Build Info
            - Build: ${{ github.run_number }}
            - Version: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Cleanup keystore
        if: always()
        run: rm -f release-keystore.jks
